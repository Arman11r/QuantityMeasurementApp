server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
      routes:
        - id: measurement-service
          uri: lb://measurement-service
          predicates:
            - Path=/measure/**

        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/auth/**


        - id: oauth
          uri: lb://USER-SERVICE
          predicates:
            - Path=/oauth2/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    prefer-ip-address: true

logging:
  level:
    org.springframework.cloud.gateway: TRACE
    org.springframework.web: DEBUG