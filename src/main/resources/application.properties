spring.application.name=quantity-measurement-app

# ?? MySQL Database ????????????????????????????????????????????????????????????
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/quantitymeasurementdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=admin123

# ?? JPA / Hibernate ???????????????????????????????????????????????????????????
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# ?? H2 Console ????????????????????????????????????????????????????????????????
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ?? Security ??????????????????????????????????????????????????????????????????
spring.security.user.name=admin
spring.security.user.password=admin123
spring.security.user.roles=ADMIN

# ?? Logging ???????????????????????????????????????????????????????????????????
logging.level.com.app.quantitymeasurement=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# ?? Swagger ???????????????????????????????????????????????????????????????????
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ?? Actuator ??????????????????????????????????????????????????????????????????
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always