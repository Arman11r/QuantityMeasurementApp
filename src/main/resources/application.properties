spring.application.name=quantity-measurement-app

# ?? MySQL Database (Primary) ??????????????????????????????????????????????????
spring.datasource.url=jdbc:mysql://localhost:3306/quantitymeasurementdb
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=admin123

# ?? JPA / Hibernate ???????????????????????????????????????????????????????????
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ?? H2 In-Memory (Secondary ? for console browsing only) ?????????????????????
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# ?? Security ??????????????????????????????????????????????????????????????????
spring.security.user.name=admin
spring.security.user.password=admin123
spring.security.user.roles=ADMIN

# ?? Logging ???????????????????????????????????????????????????????????????????
logging.level.com.app.quantitymeasurement=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# ?? Swagger / OpenAPI ?????????????????????????????????????????????????????????
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ?? Actuator ??????????????????????????????????????????????????????????????????
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always